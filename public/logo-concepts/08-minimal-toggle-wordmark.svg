<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Minimal toggle wordmark logo concept</title>
  <desc id="desc">A flat OI toggle symbol with a single-line Open Image Templates wordmark.</desc>
  <rect width="720" height="220" fill="#ffffff"/>
  <g transform="translate(70 72)">
    <rect x="0" y="0" width="120" height="58" rx="29" fill="#08090d"/>
    <circle cx="31" cy="29" r="18" fill="none" stroke="#ffffff" stroke-width="8"/>
    <rect x="77" y="13" width="12" height="32" rx="6" fill="#12d5c1"/>
  </g>
  <text x="226" y="119" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="780" fill="#08090d" letter-spacing="-1.2">Open Image Templates</text>
</svg>
