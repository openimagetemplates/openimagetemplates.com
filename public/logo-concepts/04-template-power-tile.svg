<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Template power tile concept</title>
  <desc id="desc">A rounded template tile containing an OI power mark, paired with a compact wordmark.</desc>
  <rect width="720" height="260" rx="34" fill="#ffffff"/>
  <g transform="translate(58 42)">
    <rect x="0" y="0" width="176" height="176" rx="36" fill="#08090d"/>
    <rect x="28" y="30" width="120" height="116" rx="18" fill="#ffffff" opacity="0.08"/>
    <circle cx="88" cy="92" r="48" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-dasharray="224 74" transform="rotate(42 88 92)"/>
    <rect x="79" y="30" width="18" height="76" rx="9" fill="url(#tileGradient)"/>
    <path d="M57 140h62" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  </g>
  <g transform="translate(282 74)">
    <text x="0" y="47" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="780" fill="#08090d" letter-spacing="-1.8">Open Image</text>
    <text x="0" y="98" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="780" fill="#08090d" letter-spacing="-1.8">Templates</text>
  </g>
  <defs>
    <linearGradient id="tileGradient" x1="78" y1="109" x2="101" y2="31" gradientUnits="userSpaceOnUse">
      <stop stop-color="#015a9e"/>
      <stop offset="1" stop-color="#11e9bb"/>
    </linearGradient>
  </defs>
</svg>
