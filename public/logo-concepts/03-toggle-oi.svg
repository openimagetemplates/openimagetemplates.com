  <rect width="720" height="260" rx="34" fill="#f5f3ef"/>
  <g transform="translate(52 58)">
    <rect x="0" y="28" width="210" height="106" rx="53" fill="#08090d"/>
    <circle cx="63" cy="81" r="38" fill="#ffffff"/>
    <rect x="134" y="44" width="18" height="74" rx="9" fill="url(#toggleGradient)"/>
    <path d="M63 54a27 27 0 1 1 0 54a27 27 0 0 1 0-54z" fill="none" stroke="url(#toggleGradient)" stroke-width="9"/>
  </g>
  <g transform="translate(300 77)">
