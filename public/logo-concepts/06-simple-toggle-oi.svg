<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Simple OI toggle logo concept</title>
  <desc id="desc">A simplified toggle mark that reads as O and I, paired with a compact wordmark.</desc>
  <rect width="720" height="220" fill="#ffffff"/>
  <g transform="translate(72 63)">
    <rect x="0" y="0" width="132" height="72" rx="36" fill="#08090d"/>
    <circle cx="36" cy="36" r="21" fill="#ffffff"/>
    <circle cx="36" cy="36" r="14" fill="none" stroke="#0aa1bd" stroke-width="5"/>
    <rect x="84" y="17" width="13" height="38" rx="6.5" fill="#12d5c1"/>
  </g>
  <g transform="translate(240 74)" fill="#08090d">
    <text x="0" y="34" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="780" letter-spacing="-1">Open Image</text>
    <text x="0" y="70" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="780" letter-spacing="-1">Templates</text>
  </g>
</svg>
