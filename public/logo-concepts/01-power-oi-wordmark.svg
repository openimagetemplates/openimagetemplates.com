<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Power OI wordmark concept</title>
  <desc id="desc">A circular O with a vertical I forming a power symbol, followed by the Open Image Templates wordmark.</desc>
  <rect width="720" height="260" rx="34" fill="#f7f7f4"/>
  <g transform="translate(54 46)">
    <circle cx="84" cy="84" r="64" fill="none" stroke="#08090d" stroke-width="18" stroke-linecap="round" stroke-dasharray="302 84" transform="rotate(42 84 84)"/>
    <rect x="75" y="8" width="18" height="88" rx="9" fill="url(#powerGradient)"/>
    <circle cx="84" cy="84" r="28" fill="#ffffff"/>
    <rect x="77" y="40" width="14" height="56" rx="7" fill="#08090d"/>
  </g>
  <g transform="translate(228 72)" fill="#08090d">
    <text x="0" y="53" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="760" letter-spacing="-2">Open Image</text>
    <text x="0" y="108" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="760" letter-spacing="-2">Templates</text>
  </g>
  <defs>
    <linearGradient id="powerGradient" x1="75" y1="96" x2="96" y2="4" gradientUnits="userSpaceOnUse">
      <stop stop-color="#015a9e"/>
      <stop offset="1" stop-color="#11e9bb"/>
    </linearGradient>
  </defs>
</svg>
