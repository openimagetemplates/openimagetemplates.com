<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="open-image-templates-og-title">
  <title id="open-image-templates-og-title">Open Image Templates</title>
  <defs>
    <mask id="open-image-templates-og-cutout">
      <rect x="0" y="0" width="210" height="108" rx="54" fill="white" />
      <circle cx="66" cy="54" r="21" fill="none" stroke="black" stroke-width="12" />
      <rect x="138" y="30" width="12" height="48" rx="6" fill="black" />
    </mask>
    <linearGradient id="open-image-templates-og-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#015a9e" />
      <stop offset="1" stop-color="#11e9bb" />
    </linearGradient>
    <filter id="open-image-templates-og-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#18181b" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3ef" />
  <circle cx="1020" cy="110" r="210" fill="#e4fbf6" opacity="0.78" />
  <circle cx="160" cy="560" r="220" fill="#e8f1ff" opacity="0.62" />

  <g transform="translate(76 72) scale(0.82)">
    <rect x="0" y="0" width="210" height="108" rx="54" fill="#08090d" mask="url(#open-image-templates-og-cutout)" />
  </g>

  <g transform="translate(76 226)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="820" letter-spacing="-3.6" fill="#08090d">
