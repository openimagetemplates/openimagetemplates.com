    </text>
    <text x="0" y="82" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="420" letter-spacing="-2.4" fill="#08090d">
      Templates
    </text>
    <text x="0" y="164" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="29" font-weight="520" fill="#52525b">
