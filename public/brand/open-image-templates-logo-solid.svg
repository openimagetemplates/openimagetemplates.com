<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="open-image-templates-logo-solid-title">
  <title id="open-image-templates-logo-solid-title">Open Image Templates Logo</title>
  <defs>
    <mask id="cutout-toggle">
      <rect x="0" y="0" width="140" height="72" rx="36" fill="white" />
      <circle cx="44" cy="36" r="14" fill="none" stroke="black" stroke-width="8" />
      <rect x="92" y="20" width="8" height="32" rx="4" fill="black" />
    </mask>
  </defs>
  <g transform="translate(28 44)">
    <rect x="0" y="0" width="140" height="72" rx="36" fill="#08090d" mask="url(#cutout-toggle)" />
  </g>
  <g transform="translate(196 45)" fill="#08090d">
    <text x="0" y="34" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" letter-spacing="-1.5">Open Image</text>
    <text x="0" y="70" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="400" letter-spacing="-0.5">Templates</text>
  </g>
</svg>
